name: flutter_cake_shop_app
description: "A new Flutter project."

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2 # ใช้ font จาก fonts google
  font_awesome_flutter: ^10.12.0 #ใ ใช้สร้าง icons แปลกๆ
  url_launcher: ^6.3.2 # ใช้เปิดแอพ อิ่นๆ เช่น Map Google Facebook Mobile Browser
  flutter_map: ^8.2.2 # ใช้แสดงแผนที่
  latlong2: ^0.9.1 # ใช้จัดการเรื่องพิกัด Lattidue/Longtitue
  carousel_slider: ^5.1.2 # ใฃ้ทำ Slider

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  icons_launcher: ^3.0.3 #ใช้สร้าง icons app ios/android

icons_launcher:
  image_path: "assets/icon/icon.png"
  platforms:
    android:
      enable: true
    ios:
      enable: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/
